<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Fest — Register Now</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <a href="index.html" class="logo">Sports Fest <span>2026</span></a>
  </header>

  <!-- ===== HERO SECTION ===== -->
  <section class="hero">
    <h1 class="hero-eyebrow">Maximus Arena</h1>
    <h3>Choose Your <em>Sport</em></h3>
    <p class="hero-sub">
      Select a sport below to explore match timings and complete your registration.
    </p>
  </section>

  <div class="divider">
    <span class="divider-symbol">✦</span>
  </div>

  <!-- ===== SPORTS ARENA SECTION ===== -->
  <section class="sports-arena">
    <p class="section-label">All Sports</p>

    <div class="arena-container">

      <!-- Football Zone -->
      <a href="event.html?event=Phantom League" class="sport-zone football-zone">
        <div class="sport-icon">⚽</div>
        <div class="sport-info">
          <h3 class="sport-name">Phantom League</h3>
          <p class="sport-desc">Epic pitch battles</p>
        </div>
        <div class="zone-glow"></div>
      </a>

      <!-- Basketball Zone -->
      <a href="event.html?event=VolleyX" class="sport-zone volleyball-zone">
        <div class="sport-icon">🏐</div>
        <div class="sport-info">
          <h3 class="sport-name">VolleyX</h3>
          <p class="sport-desc">Spike & block action</p>
        </div>
        <div class="zone-glow"></div>
      </a>

      <!-- Cricket Zone -->
      <a href="event.html?event=PowerPlay Premier" class="sport-zone cricket-zone">
        <div class="sport-icon">🏏</div>
        <div class="sport-info">
          <h3 class="sport-name">PowerPlay Premier</h3>
          <p class="sport-desc">Bat & ball showdown</p>
        </div>
        <div class="zone-glow"></div>
      </a>

    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    &copy; 2026 Sports Fest. All rights reserved.
  </footer>

</body>
</html>
